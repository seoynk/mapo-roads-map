<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마포구 도로명 지도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef0f4;
      --surface: rgba(255,255,255,0.82);
      --surface-solid: #ffffff;
      --border: rgba(0,0,0,0.07);
      --text: #18181c;
      --muted: #8a8fa8;
      --accent: #3d63dd;
      --accent-bg: #eef2ff;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.11), 0 0 0 1px rgba(0,0,0,0.04);
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      overflow: hidden;
    }

    #map {
      position: fixed;
      inset: 0;
    }

    /* ─── 왼쪽 패널 ─── */
    #left-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 300px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 헤더 카드 */
    .header-card {
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 18px 20px 16px;
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .header-title {
      font-family: 'Gowun Dodum', serif;
      font-size: 22px;
      letter-spacing: -0.3px;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    /* 범례 */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .legend:empty {
      padding-top: 0;
      border-top: none;
    }

    .legend-line {
      border-radius: 99px;
      flex-shrink: 0;
      background: var(--text);
      opacity: 0.85;
    }

    .legend-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* 검색창 */
    .search-wrap {
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .search-wrap:focus-within {
      box-shadow: var(--shadow-md), 0 0 0 2px rgba(61,99,221,0.18);
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }

    .search-icon {
      width: 16px;
      height: 16px;
      opacity: 0.35;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
    }

    #search-input::placeholder { color: var(--muted); }

    #clear-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 0 2px;
    }

    /* ─── 오른쪽 패널 ─── */
    #side-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 264px;
      max-height: calc(100vh - 40px);
      z-index: 100;
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .side-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .side-header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .side-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .road-count-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .side-sub {
      font-size: 11px;
      color: var(--muted);
    }

    #road-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    #road-list::-webkit-scrollbar { width: 4px; }
    #road-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 99px; }

    .road-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    .road-item:hover { background: rgba(0,0,0,0.04); }

    .road-item.active {
      background: var(--accent-bg);
      border-color: rgba(61,99,221,0.18);
    }

    .road-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .road-name {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .road-type-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px 6px;
      background: rgba(0,0,0,0.05);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .empty-msg {
      padding: 24px 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }

    /* ─── 하단 툴팁 ─── */
    #tooltip {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(14px);
      z-index: 200;
      min-width: 240px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 18px 22px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      text-align: center;
    }

    #tooltip.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #tooltip-stripe {
      height: 4px;
      border-radius: 99px;
      width: 40px;
      margin: 0 auto 12px;
    }

    #tooltip-name {
      font-family: 'Gowun Dodum', serif;
      font-size: 21px;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 4px;
    }

    #tooltip-type {
      font-size: 12px;
      color: var(--muted);
    }

    #tooltip-close {
      position: absolute;
      top: 10px; right: 14px;
      border: none; background: none;
      color: var(--muted);
      font-size: 17px;
      cursor: pointer;
      line-height: 1;
    }

    /* ─── 도로명 라벨 오버레이 ─── */
    .road-label {
      position: relative;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .road-label span {
      display: block;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 600;
      white-space: nowrap;
      background: rgba(255,255,255,0.92);
      border-radius: 5px;
      padding: 2px 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
      border: 1px solid rgba(0,0,0,0.07);
      line-height: 1.4;
      letter-spacing: -0.2px;
    }

    /* ─── 로딩 ─── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    #loading.hide { opacity: 0; pointer-events: none; }

    .loading-icon {
      font-size: 36px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.92); }
    }

    .loading-title {
      font-family: 'Gowun Dodum', serif;
      font-size: 13px;
      color: var(--text);
    }

    .fighting {
      font-family: 'Gowun Dodum', serif;
      font-size: 20px;
      color: var(--text);
    }

    .loading-sub {
      font-size: 13px;
      color: var(--muted);
    }

    /* ─── 반응형 ─── */
    @media (max-width: 820px) {
      #left-panel { width: calc(100vw - 40px); }

      #side-panel {
        top: auto;
        left: 20px;
        right: 20px;
        bottom: 20px;
        width: auto;
        height: 220px !important;
        max-height: 220px;
      }

      #tooltip { bottom: 260px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-icon">🗺</div>
  <div class="loading-title">마포구 도로명 지도</div>
  <div class="loading-sub">도로 데이터를 불러오는 중...</div>
  <div class="fighting">김윤경 화이팅 !! 💕💕</div>
</div>

<div id="map"></div>

<!-- 왼쪽 패널 -->
<div id="left-panel">
  <div class="search-wrap">
    <div class="search-inner">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="도로명 검색  예: 망원로" autocomplete="off" />
      <button id="clear-btn">×</button>
    </div>
  </div>
</div>

<!-- 오른쪽 목록 패널 -->
<aside id="side-panel">
  <div class="side-header">
    <div class="side-header-top">
      <span class="side-title">현재 화면의 도로명</span>
      <span class="road-count-badge" id="road-count">0</span>
    </div>
    <div class="side-sub">화면을 이동하면 목록이 업데이트됩니다</div>
  </div>
  <div id="road-list"></div>
</aside>

<!-- 클릭 툴팁 -->
<div id="tooltip">
  <button id="tooltip-close">×</button>
  <div id="tooltip-stripe"></div>
  <div id="tooltip-name">도로명</div>
  <div id="tooltip-type">도로 구분</div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?"></script>

<script>
  const MAPO = {
    name: '마포구',
    code: '11440',
    center: [37.556, 126.91],
    file: 'mapo_roads.geojson'
  };

  const ROAD_TYPE  = { '1':'고속도로', '2':'대로', '3':'로', '4':'길' };
  const ROAD_WIDTH = { '1':6, '2':4.5, '3':2.8, '4':1.6 };

  // 줌 레벨별 라벨 표시 기준
  // 카카오맵: 숫자 작을수록 확대. 3 이하 = 많이 확대
  const LABEL_LEVEL = {
    '1': 8,  // 고속도로: 줌 8 이하(확대)에서 표시
    '2': 6,  // 대로: 줌 6 이하
    '3': 5,  // 로: 줌 5 이하
    '4': 4,  // 길: 줌 4 이하 (많이 확대했을 때만)
  };

  let map;
  let allPolylines = [];
  let roadIndex = {};
  let roadMeta  = {};
  let activeRoadName = null;
  let labelOverlays = [];  // 현재 표시 중인 라벨 오버레이

  window.onload = function () {
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(MAPO.center[0], MAPO.center[1]),
      level: 5
    });

    setupSearch();
    setupTooltip();
    loadRoads();

    kakao.maps.event.addListener(map, 'idle', () => {
      updateVisibleRoadList();
      updateLabels();
    });
  };

  /* ── 데이터 로드 ── */
  function loadRoads() {
    fetch(MAPO.file)
      .then(r => r.json())
      .then(data => {
        renderRoads(data);
        updateVisibleRoadList();
        updateLabels();
        document.getElementById('loading').classList.add('hide');
      })
      .catch(() => {
        document.getElementById('loading').querySelector('.loading-sub').textContent =
          'mapo_roads.geojson 파일을 찾을 수 없습니다.';
      });
  }

  function renderRoads(data) {
    data.features.forEach(feature => {
      const rn   = feature.properties.RN     || '도로명 없음';
      const rnCd = feature.properties.RN_CD  || '0';
      const cls  = String(parseInt(feature.properties.ROA_CLS_SE) || 4);
      const color  = getColor(rnCd, cls);
      const weight = ROAD_WIDTH[cls] || 2;
      const lines  = feature.geometry.type === 'LineString'
        ? [feature.geometry.coordinates]
        : feature.geometry.coordinates;

      if (!roadIndex[rn]) roadIndex[rn] = [];
      if (!roadMeta[rn])  roadMeta[rn]  = { name: rn, type: ROAD_TYPE[cls] || '길', cls, color };

      lines.forEach(coords => {
        const path = coords.map(c => new kakao.maps.LatLng(c[1], c[0]));
        const poly = new kakao.maps.Polyline({
          path,
          strokeWeight:  weight,
          strokeColor:   color,
          strokeOpacity: 0.82,
          strokeStyle:   'solid'
        });
        poly.setMap(map);
        poly._rn            = rn;
        poly._color         = color;
        poly._cls           = cls;
        poly._defaultWeight = weight;

        allPolylines.push(poly);
        roadIndex[rn].push(poly);

        kakao.maps.event.addListener(poly, 'click', () => focusRoad(rn));
      });
    });
  }

  /* ── 도로명 라벨 (줌 레벨 기반) ── */
  function updateLabels() {
    // 기존 라벨 모두 제거
    labelOverlays.forEach(ov => ov.setMap(null));
    labelOverlays = [];

    const level = map.getLevel();
    const bounds = map.getBounds();

    // 이미 표시한 도로명 중복 방지
    const shown = new Set();

    allPolylines.forEach(poly => {
      const cls = poly._cls;
      if (level > LABEL_LEVEL[cls]) return;  // 현재 줌에서 이 등급은 표시 안 함
      if (shown.has(poly._rn)) return;        // 같은 도로명 중복 방지

      // 폴리라인 중간 좌표 계산
      const path = poly.getPath();
      if (!path.length) return;
      const mid = path[Math.floor(path.length / 2)];
      if (!bounds.contain(mid)) return;       // 화면 밖이면 스킵

      shown.add(poly._rn);

      // 폰트 크기 등급별 차등
      const fontSize = cls === '1' ? 13 : cls === '2' ? 12 : cls === '3' ? 11 : 10;
      const color    = poly._color;

      const content = `<div class="road-label">
        <span style="font-size:${fontSize}px;color:${color};">${poly._rn}</span>
      </div>`;

      const overlay = new kakao.maps.CustomOverlay({
        position: mid,
        content,
        yAnchor: 0.5,
        xAnchor: 0.5,
        zIndex: 3
      });
      overlay.setMap(map);
      labelOverlays.push(overlay);
    });
  }

  /* ── 화면 내 도로 목록 ── */
  function updateVisibleRoadList() {
    const bounds = map.getBounds();
    const visible = new Set();

    allPolylines.forEach(poly => {
      poly.getPath().forEach(pt => {
        if (bounds.contain(pt)) visible.add(poly._rn);
      });
    });

    renderRoadList(document.getElementById('search-input').value.trim(), visible);
  }

  function renderRoadList(filter = '', visible) {
    const list = document.getElementById('road-list');
    const names = Array.from(visible || new Set())
      .filter(n => n.includes(filter))
      .sort((a, b) => a.localeCompare(b, 'ko'));

    document.getElementById('road-count').textContent = names.length;

    if (!names.length) {
      list.innerHTML = `<div class="empty-msg">현재 화면에 도로명이 없습니다.<br>지도를 확대하거나 이동해보세요.</div>`;
      const panel = document.getElementById('side-panel');
      const headerH = panel.querySelector('.side-header').offsetHeight;
      panel.style.height = (headerH + 96) + 'px';
      return;
    }

    list.innerHTML = names.map(name => {
      const m = roadMeta[name];
      return `<div class="road-item${name === activeRoadName ? ' active' : ''}" data-rn="${esc(name)}">
        <div class="road-dot" style="background:${m.color}"></div>
        <div class="road-name">${esc(name)}</div>
        <div class="road-type-badge">${m.type}</div>
      </div>`;
    }).join('');

    list.querySelectorAll('.road-item').forEach(el => {
      el.addEventListener('click', () => focusRoad(el.dataset.rn));
    });

    // 패널 높이 동적 조정
    const panel = document.getElementById('side-panel');
    const header = panel.querySelector('.side-header');
    const ITEM_H = 42;   // road-item 한 줄 높이 (padding 포함)
    const MAX_ITEMS = 10; // 이 이상이면 스크롤
    const headerH = header.offsetHeight;
    const itemCount = Math.min(names.length, MAX_ITEMS);
    const listH = names.length ? itemCount * ITEM_H + 16 : 72; // empty-msg 포함
    const targetH = headerH + listH;
    const maxH = window.innerHeight - 40;
    panel.style.height = Math.min(targetH, maxH) + 'px';
  }

  /* ── 도로 포커스 ── */
  function focusRoad(rn) {
    activeRoadName = rn;
    const polys = roadIndex[rn];
    if (!polys?.length) return;

    allPolylines.forEach(p => p.setOptions({
      strokeOpacity: p._rn === rn ? 1 : 0.1,
      strokeWeight:  p._rn === rn ? Math.max(p._defaultWeight + 2.5, 5) : p._defaultWeight
    }));

    const bounds = new kakao.maps.LatLngBounds();
    polys.forEach(p => p.getPath().forEach(pt => bounds.extend(pt)));
    map.setBounds(bounds);

    const m = roadMeta[rn];
    showTooltip(m.name, m.type, m.color);
    setTimeout(updateVisibleRoadList, 260);
  }

  function resetHighlight() {
    activeRoadName = null;
    allPolylines.forEach(p => p.setOptions({
      strokeOpacity: 0.82,
      strokeWeight:  p._defaultWeight
    }));
    document.getElementById('tooltip').classList.remove('show');
    updateVisibleRoadList();
  }

  function getColor(rnCd, cls) {
    const n = parseInt(rnCd) || 0;
    const hue = (Math.floor(n / 1000) * 11 + (n % 1000) * 17) % 360;
    const s = Number(cls) <= 2 ? 78 : 64;
    const l = Number(cls) <= 2 ? 48 : 46;
    return `hsl(${hue},${s}%,${l}%)`;
  }

  /* ── 검색 ── */
  function setupSearch() {
    const input    = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    let lastVisible = new Set();

    kakao.maps.event.addListener(map, 'idle', () => {
      const bounds = map.getBounds();
      lastVisible = new Set();
      allPolylines.forEach(p => {
        p.getPath().forEach(pt => { if (bounds.contain(pt)) lastVisible.add(p._rn); });
      });
    });

    input.addEventListener('input', () => {
      clearBtn.style.display = input.value ? 'block' : 'none';
      renderRoadList(input.value.trim(), lastVisible);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.style.display = 'none';
      resetHighlight();
    });
  }

  /* ── 툴팁 ── */
  function setupTooltip() {
    document.getElementById('tooltip-close').addEventListener('click', resetHighlight);
  }

  function showTooltip(name, type, color) {
    document.getElementById('tooltip-stripe').style.background = color;
    document.getElementById('tooltip-name').textContent = name;
    document.getElementById('tooltip-type').textContent = type;
    document.getElementById('tooltip').classList.add('show');
  }

  function esc(t) {
    return String(t)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
