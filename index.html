<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <!-- Fix 3: maximum-scale=1 + user-scalable=no 로 모바일 자동 확대 방지 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>마포구 도로명 지도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef0f4;
      --surface: rgba(255,255,255,0.82);
      --surface-solid: #ffffff;
      --border: rgba(0,0,0,0.07);
      --text: #18181c;
      --muted: #8a8fa8;
      --accent: #3d63dd;
      --accent-bg: #eef2ff;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.11), 0 0 0 1px rgba(0,0,0,0.04);
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      overflow: hidden;
      /* Fix 3: 터치 액션으로 인한 의도치 않은 확대 방지 */
      touch-action: manipulation;
    }

    #map { position: fixed; inset: 0; }

    #left-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 300px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .search-container {
      flex: 1;
      position: relative;
    }

    .search-wrap {
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.2s, border-radius 0.2s;
    }

    .search-wrap.open {
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: var(--shadow-md), 0 0 0 2px rgba(61,99,221,0.18);
      border-bottom-color: rgba(61,99,221,0.12);
    }

    .search-wrap:focus-within:not(.open) {
      box-shadow: var(--shadow-md), 0 0 0 2px rgba(61,99,221,0.18);
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }

    .search-icon {
      width: 16px; height: 16px;
      opacity: 0.35;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      /* Fix 3: iOS Safari는 font-size 16px 미만이면 포커스 시 자동 확대 → 16px 고정 */
      font-size: 16px;
      color: var(--text);
      font-family: inherit;
      touch-action: manipulation;
    }

    /* 데스크톱에서는 14px */
    @media (min-width: 481px) {
      #search-input { font-size: 14px; }
    }

    #search-input::placeholder { color: var(--muted); }

    #clear-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
      touch-action: manipulation;
    }
    #clear-btn:hover { color: var(--text); }

    /* ─── 자동완성 드롭다운 ─── */
    #autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface-solid);
      border: 1px solid rgba(61,99,221,0.18);
      border-top: 1px solid rgba(61,99,221,0.08);
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: 0 12px 32px rgba(0,0,0,0.13);
      overflow: hidden;
      display: none;
      z-index: 200;
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    #autocomplete-dropdown::-webkit-scrollbar { width: 4px; }
    #autocomplete-dropdown::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 99px; }
    #autocomplete-dropdown.visible { display: block; }

    .ac-header {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid rgba(0,0,0,0.03);
      outline: none;
    }

    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.highlighted { background: var(--accent-bg); }

    .ac-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ac-text { flex: 1; min-width: 0; }

    .ac-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ac-name mark {
      background: none;
      color: var(--accent);
      font-weight: 700;
    }

    .ac-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(0,0,0,0.05);
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .ac-empty {
      padding: 18px 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ─── 현위치 버튼 ─── */
    #locate-btn {
      flex-shrink: 0;
      width: 44px;
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s, background 0.2s;
      color: var(--accent);
      touch-action: manipulation;
    }

    #locate-btn:hover { box-shadow: var(--shadow-md); background: var(--accent-bg); }
    #locate-btn:active { transform: scale(0.94); }

    #locate-btn.loading {
      animation: spin 1s linear infinite;
      pointer-events: none;
      opacity: 0.6;
    }

    #locate-btn.error {
      color: #e03535;
      border-color: rgba(224,53,53,0.2);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 오른쪽 패널 ─── */
    #side-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 264px;
      max-height: calc(100vh - 40px);
      z-index: 100;
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .side-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .side-header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .side-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }

    .road-count-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .side-sub { font-size: 11px; color: var(--muted); }

    #road-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    #road-list::-webkit-scrollbar { width: 4px; }
    #road-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 99px; }

    .road-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
      touch-action: manipulation;
    }

    .road-item:hover { background: rgba(0,0,0,0.04); }

    .road-item.active {
      background: var(--accent-bg);
      border-color: rgba(61,99,221,0.18);
    }

    .road-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .road-name { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); letter-spacing: -0.2px; }

    .road-type-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px 6px;
      background: rgba(0,0,0,0.05);
      border-radius: 6px;
      flex-shrink: 0;
    }

    .empty-msg {
      padding: 24px 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }

    /* ─── 하단 툴팁 ─── */
    #tooltip {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(14px);
      z-index: 200;
      min-width: 180px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 12px 16px 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      text-align: center;
    }

    #tooltip.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #tooltip-stripe { height: 4px; border-radius: 99px; width: 40px; margin: 0 auto 12px; }

    #tooltip-name {
      font-family: 'Gowun Dodum', serif;
      font-size: 16px;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 4px;
    }

    #tooltip-type { font-size: 11px; color: var(--muted); }

    #tooltip-close {
      position: absolute;
      top: 10px; right: 14px;
      border: none; background: none;
      color: var(--muted);
      font-size: 17px;
      cursor: pointer;
      line-height: 1;
      touch-action: manipulation;
    }

    /* ─── 현위치 마커 ─── */
    .my-location-marker {
      width: 18px; height: 18px;
      background: var(--accent);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(61,99,221,0.45);
      transform: translate(-50%, -50%);
    }

    .my-location-pulse {
      width: 48px; height: 48px;
      background: rgba(61,99,221,0.15);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: locPulse 2s ease-out infinite;
    }

    @keyframes locPulse {
      0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1);   opacity: 0; }
    }

    /* ─── 도로명 라벨 ─── */
    .road-label {
      position: relative;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    /* Fix 2: 클릭 가능한 라벨 */
    .road-label.clickable {
      pointer-events: auto;
      cursor: pointer;
    }

    .road-label span {
      display: block;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 600;
      white-space: nowrap;
      background: rgba(255,255,255,0.92);
      border-radius: 5px;
      padding: 2px 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
      border: 1px solid rgba(0,0,0,0.07);
      line-height: 1.4;
      letter-spacing: -0.2px;
      transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .road-label.clickable:hover span {
      background: var(--accent-bg);
      box-shadow: 0 2px 8px rgba(61,99,221,0.2);
      border-color: rgba(61,99,221,0.25);
    }

    /* ─── 로딩 ─── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s;
    }

    #loading.hide { opacity: 0; pointer-events: none; }

    .loading-icon { font-size: 36px; animation: pulse 1.4s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.92); }
    }

    .loading-title { font-family: 'Gowun Dodum', serif; font-size: 13px; color: var(--text); }
    .fighting { font-family: 'Gowun Dodum', serif; font-size: 20px; color: var(--text); }
    .loading-sub { font-size: 13px; color: var(--muted); }

    /* ─── 반응형 ─── */
    @media (max-width: 820px) {
      #left-panel { width: calc(100vw - 40px); }

      #side-panel {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
        height: auto !important;
        max-height: 130px;
      }

      /* 모바일: 부제목 숨김 */
      #side-panel .side-sub { display: none; }

      /* 모바일: 헤더 컴팩트 */
      #side-panel .side-header { padding: 10px 14px 8px; }

      /* 모바일: 아이템 컴팩트 */
      #side-panel .road-item { padding: 7px 10px; }

      /* 아이템 2개 높이 고정 */
      #road-list { max-height: 84px; overflow-y: auto; }

      #tooltip { bottom: 150px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-icon">🗺</div>
  <div class="loading-title">마포구 도로명 지도</div>
  <div class="loading-sub">도로 데이터를 불러오는 중...</div>
  <div class="fighting">김윤경 화이팅 !! 💕💕</div>
</div>

<div id="map"></div>

<div id="left-panel">
  <div class="search-row">
    <div class="search-container">
      <div class="search-wrap" id="search-wrap">
        <div class="search-inner">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="search-input" type="text" placeholder="도로명 검색  예: 망원로" autocomplete="off" />
          <button id="clear-btn">×</button>
        </div>
      </div>
      <div id="autocomplete-dropdown"></div>
    </div>

    <button id="locate-btn" title="현재 위치로 이동">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </button>
  </div>
</div>

<aside id="side-panel">
  <div class="side-header">
    <div class="side-header-top">
      <span class="side-title">현재 화면의 도로명</span>
      <span class="road-count-badge" id="road-count">0</span>
    </div>
    <div class="side-sub">화면을 이동하면 목록이 업데이트됩니다</div>
  </div>
  <div id="road-list"></div>
</aside>

<div id="tooltip">
  <button id="tooltip-close">×</button>
  <div id="tooltip-stripe"></div>
  <div id="tooltip-name">도로명</div>
  <div id="tooltip-type">도로 구분</div>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5476b12bce145a577ffb44291160051e"></script>

<script>
  const MAPO = {
    name: '마포구',
    code: '11440',
    center: [37.556, 126.91],
    file: 'mapo_roads.geojson'
  };

  const ROAD_TYPE  = { '1':'고속도로', '2':'대로', '3':'로', '4':'길' };
  const ROAD_WIDTH = { '1':6, '2':4.5, '3':2.8, '4':1.6 };
  const LABEL_LEVEL = { '1': 8, '2': 6, '3': 5, '4': 4 };

  let map;
  let allPolylines = [];
  let roadIndex = {};
  let roadMeta  = {};
  let activeRoadName = null;
  let labelOverlays = [];
  let locationOverlays = [];

  let acHighlightIndex = -1;
  let acItems = [];

  // Fix 1: 사이드패널용 visible set — 검색어와 완전히 독립
  let currentVisibleSet = new Set();

  window.onload = function () {
    map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(MAPO.center[0], MAPO.center[1]),
      level: 5
    });

    setupSearch();
    setupTooltip();
    setupLocate();
    loadRoads();

    kakao.maps.event.addListener(map, 'idle', () => {
      refreshVisibleSet();
      updateVisibleRoadList();
      updateLabels();
    });

    kakao.maps.event.addListener(map, 'click', closeAutocomplete);

    // Fix 2: map div 클릭 이벤트로 라벨 클릭 처리 (이벤트 위임)
    document.getElementById('map').addEventListener('click', handleLabelClick);
  };

  /* ── 데이터 로드 ── */
  function loadRoads() {
    fetch(MAPO.file)
      .then(r => r.json())
      .then(data => {
        renderRoads(data);
        refreshVisibleSet();
        updateVisibleRoadList();
        updateLabels();
        document.getElementById('loading').classList.add('hide');
      })
      .catch(() => {
        document.getElementById('loading').querySelector('.loading-sub').textContent =
          'mapo_roads.geojson 파일을 찾을 수 없습니다.';
      });
  }

  function renderRoads(data) {
    data.features.forEach(feature => {
      const rn   = feature.properties.RN     || '도로명 없음';
      const rnCd = feature.properties.RN_CD  || '0';
      const cls  = String(parseInt(feature.properties.ROA_CLS_SE) || 4);
      const color  = getColor(rnCd, cls);
      const weight = ROAD_WIDTH[cls] || 2;
      const lines  = feature.geometry.type === 'LineString'
        ? [feature.geometry.coordinates]
        : feature.geometry.coordinates;

      if (!roadIndex[rn]) roadIndex[rn] = [];
      if (!roadMeta[rn])  roadMeta[rn]  = { name: rn, type: ROAD_TYPE[cls] || '길', cls, color };

      lines.forEach(coords => {
        const path = coords.map(c => new kakao.maps.LatLng(c[1], c[0]));
        const poly = new kakao.maps.Polyline({
          path,
          strokeWeight:  weight,
          strokeColor:   color,
          strokeOpacity: 0.82,
          strokeStyle:   'solid'
        });
        poly.setMap(map);
        poly._rn            = rn;
        poly._color         = color;
        poly._cls           = cls;
        poly._defaultWeight = weight;

        allPolylines.push(poly);
        roadIndex[rn].push(poly);

        kakao.maps.event.addListener(poly, 'click', () => focusRoad(rn));
      });
    });
  }

  /* ── Fix 1: visible set을 검색어와 독립적으로 갱신 ── */
  function refreshVisibleSet() {
    const bounds = map.getBounds();
    currentVisibleSet = new Set();
    allPolylines.forEach(poly => {
      poly.getPath().forEach(pt => {
        if (bounds.contain(pt)) currentVisibleSet.add(poly._rn);
      });
    });
  }

  /* ── Fix 1: 사이드패널은 항상 화면 내 전체 도로를 표시 (검색 필터 없음) ── */
  function updateVisibleRoadList() {
    renderRoadList(currentVisibleSet);
  }

  function renderRoadList(visible) {
    const list = document.getElementById('road-list');
    const names = Array.from(visible || new Set())
      .sort((a, b) => a.localeCompare(b, 'ko'));

    document.getElementById('road-count').textContent = names.length;

    if (!names.length) {
      list.innerHTML = `<div class="empty-msg">현재 화면에 도로명이 없습니다.<br>지도를 확대하거나 이동해보세요.</div>`;
      const panel = document.getElementById('side-panel');
      const headerH = panel.querySelector('.side-header').offsetHeight;
      panel.style.height = (headerH + 96) + 'px';
      return;
    }

    list.innerHTML = names.map(name => {
      const m = roadMeta[name];
      return `<div class="road-item${name === activeRoadName ? ' active' : ''}" data-rn="${esc(name)}">
        <div class="road-dot" style="background:${m.color}"></div>
        <div class="road-name">${esc(name)}</div>
        <div class="road-type-badge">${m.type}</div>
      </div>`;
    }).join('');

    list.querySelectorAll('.road-item').forEach(el => {
      el.addEventListener('click', () => focusRoad(el.dataset.rn));
    });

    const panel = document.getElementById('side-panel');
    const header = panel.querySelector('.side-header');
    const ITEM_H = 42;
    const MAX_ITEMS = 10;
    const headerH = header.offsetHeight;
    const itemCount = Math.min(names.length, MAX_ITEMS);
    const listH = itemCount * ITEM_H + 16;
    const targetH = headerH + listH;
    const maxH = window.innerHeight - 40;
    panel.style.height = Math.min(targetH, maxH) + 'px';
  }

  /* ── 도로 포커스 ── */
  function focusRoad(rn) {
    activeRoadName = rn;
    const polys = roadIndex[rn];
    if (!polys?.length) return;

    allPolylines.forEach(p => p.setOptions({
      strokeOpacity: p._rn === rn ? 1 : 0.1,
      strokeWeight:  p._rn === rn ? Math.max(p._defaultWeight + 2.5, 5) : p._defaultWeight
    }));

    // 도로 전체 bounds 계산
    const bounds = new kakao.maps.LatLngBounds();
    polys.forEach(p => p.getPath().forEach(pt => bounds.extend(pt)));

    // setBounds로 먼저 맞춘 뒤, UI 패널을 피해 중심 오프셋 적용
    map.setBounds(bounds, 60);

    // 패널 여백을 고려한 중심 이동
    // 모바일: 하단 패널(~130px) + 툴팁(~80px) 만큼 위로 올림
    // 데스크톱: 하단 툴팁(~100px) 만큼 위로 올림
    setTimeout(() => {
      const isMobile = window.innerWidth <= 820;
      const mapH = window.innerHeight;
      const mapW = window.innerWidth;

      // 픽셀 단위 오프셋 (양수 = 아래로, 음수 = 위로)
      // 화면 하단에 패널이 있으므로 중심을 위로 올려서 도로가 가운데 오도록
      const offsetY = isMobile ? -(mapH * 0.10) : -(mapH * 0.15);
      const offsetX = isMobile ? 0 : (mapW * 0.08); // 데스크톱: 오른쪽 사이드패널 보정

      const proj = map.getProjection();
      const center = map.getCenter();
      const point  = proj.pointFromCoords(center);
      const moved  = new kakao.maps.Point(point.x + offsetX, point.y + offsetY);
      map.setCenter(proj.coordsFromPoint(moved));
    }, 80);

    const m = roadMeta[rn];
    showTooltip(m.name, m.type, m.color);
    setTimeout(updateVisibleRoadList, 260);
  }

  function resetHighlight() {
    activeRoadName = null;
    allPolylines.forEach(p => p.setOptions({
      strokeOpacity: 0.82,
      strokeWeight:  p._defaultWeight
    }));
    document.getElementById('tooltip').classList.remove('show');
    updateVisibleRoadList();
  }

  /* ── Fix 2: 라벨 클릭 이벤트 위임 ── */
  function handleLabelClick(e) {
    const label = e.target.closest('.road-label.clickable');
    if (!label) return;
    const rn = label.dataset.rn;
    if (rn) focusRoad(rn);
  }

  /* ── Fix 2: 라벨에 clickable 클래스 + data-rn 추가 ── */
  function updateLabels() {
    labelOverlays.forEach(ov => ov.setMap(null));
    labelOverlays = [];

    const level = map.getLevel();
    const bounds = map.getBounds();
    const shown = new Set();

    allPolylines.forEach(poly => {
      const cls = poly._cls;
      if (level > LABEL_LEVEL[cls]) return;
      if (shown.has(poly._rn)) return;

      const path = poly.getPath();
      if (!path.length) return;
      const mid = path[Math.floor(path.length / 2)];
      if (!bounds.contain(mid)) return;

      shown.add(poly._rn);

      const fontSize = cls === '1' ? 13 : cls === '2' ? 12 : cls === '3' ? 11 : 10;
      const color    = poly._color;
      const rn       = poly._rn;

      const overlay = new kakao.maps.CustomOverlay({
        position: mid,
        // Fix 2: clickable 클래스 + data-rn 속성 추가
        content: `<div class="road-label clickable" data-rn="${esc(rn)}"><span style="font-size:${fontSize}px;color:${color};">${esc(rn)}</span></div>`,
        yAnchor: 0.5,
        xAnchor: 0.5,
        zIndex: 3
      });
      overlay.setMap(map);
      labelOverlays.push(overlay);
    });
  }

  function getColor(rnCd, cls) {
    const n = parseInt(rnCd) || 0;
    const hue = (Math.floor(n / 1000) * 11 + (n % 1000) * 17) % 360;
    const s = Number(cls) <= 2 ? 78 : 64;
    const l = Number(cls) <= 2 ? 48 : 46;
    return `hsl(${hue},${s}%,${l}%)`;
  }

  /* ══════════════════════════════════════
     자동완성 검색
  ══════════════════════════════════════ */
  function setupSearch() {
    const input    = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    const dropdown = document.getElementById('autocomplete-dropdown');

    input.addEventListener('input', () => {
      const val = input.value;
      clearBtn.style.display = val ? 'block' : 'none';

      if (val.trim()) {
        showAutocomplete(val.trim());
      } else {
        closeAutocomplete();
        resetHighlight();
      }
      // Fix 1: 사이드패널은 검색어와 무관하게 화면 전체 도로 유지 → 별도 필터 없음
    });

    input.addEventListener('keydown', (e) => {
      if (!dropdown.classList.contains('visible')) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acHighlightIndex = Math.min(acHighlightIndex + 1, acItems.length - 1);
        renderHighlight();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acHighlightIndex = Math.max(acHighlightIndex - 1, -1);
        renderHighlight();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (acHighlightIndex >= 0 && acItems[acHighlightIndex]) {
          selectAutocomplete(acItems[acHighlightIndex]);
        }
      } else if (e.key === 'Escape') {
        closeAutocomplete();
        input.blur();
      }
    });

    input.addEventListener('blur', () => {
      setTimeout(closeAutocomplete, 160);
    });

    input.addEventListener('focus', () => {
      if (input.value.trim()) showAutocomplete(input.value.trim());
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.style.display = 'none';
      closeAutocomplete();
      resetHighlight();
      input.focus();
    });
  }

  function showAutocomplete(query) {
    const dropdown = document.getElementById('autocomplete-dropdown');
    const wrap     = document.getElementById('search-wrap');
    const allNames = Object.keys(roadMeta);

    const startsWith = allNames
      .filter(n => n.startsWith(query))
      .sort((a, b) => a.localeCompare(b, 'ko'));

    const contains = allNames
      .filter(n => !n.startsWith(query) && n.includes(query))
      .sort((a, b) => a.localeCompare(b, 'ko'));

    acItems = [...startsWith, ...contains].slice(0, 30);
    acHighlightIndex = -1;

    if (!acItems.length) {
      dropdown.innerHTML = `<div class="ac-empty">검색 결과가 없습니다</div>`;
      dropdown.classList.add('visible');
      wrap.classList.add('open');
      return;
    }

    let html = '';
    if (startsWith.length) {
      html += `<div class="ac-header">으로 시작하는 도로명</div>`;
      html += startsWith.slice(0, 20).map((name, i) => buildAcItem(name, query, i)).join('');
    }
    if (contains.length) {
      const offset = startsWith.length;
      html += `<div class="ac-header">포함하는 도로명</div>`;
      html += contains.slice(0, 10).map((name, i) => buildAcItem(name, query, offset + i)).join('');
    }

    dropdown.innerHTML = html;
    dropdown.classList.add('visible');
    wrap.classList.add('open');

    dropdown.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectAutocomplete(el.dataset.rn);
      });
    });
  }

  function buildAcItem(name, query, index) {
    const m = roadMeta[name];
    const highlighted = highlightMatch(esc(name), esc(query));
    return `<div class="ac-item" data-rn="${esc(name)}" data-index="${index}">
      <div class="ac-dot" style="background:${m.color}"></div>
      <div class="ac-text"><div class="ac-name">${highlighted}</div></div>
      <div class="ac-badge">${m.type}</div>
    </div>`;
  }

  function highlightMatch(name, query) {
    if (!query) return name;
    const idx = name.indexOf(query);
    if (idx === -1) return name;
    return name.slice(0, idx) +
      `<mark>${name.slice(idx, idx + query.length)}</mark>` +
      name.slice(idx + query.length);
  }

  function renderHighlight() {
    const items = document.querySelectorAll('.ac-item');
    items.forEach((el, i) => el.classList.toggle('highlighted', i === acHighlightIndex));
    if (acHighlightIndex >= 0 && items[acHighlightIndex]) {
      items[acHighlightIndex].scrollIntoView({ block: 'nearest' });
    }
  }

  function selectAutocomplete(rn) {
    const input = document.getElementById('search-input');
    input.value = rn;
    document.getElementById('clear-btn').style.display = 'block';
    closeAutocomplete();
    focusRoad(rn);
  }

  function closeAutocomplete() {
    const dropdown = document.getElementById('autocomplete-dropdown');
    const wrap     = document.getElementById('search-wrap');
    dropdown.classList.remove('visible');
    wrap.classList.remove('open');
    acHighlightIndex = -1;
  }

  /* ── 현위치 ── */
  function setupLocate() {
    const btn = document.getElementById('locate-btn');
    btn.addEventListener('click', () => {
      if (!navigator.geolocation) { alert('이 브라우저는 위치 정보를 지원하지 않아요.'); return; }
      btn.classList.add('loading');
      btn.classList.remove('error');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          btn.classList.remove('loading');
          const latlng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);

          locationOverlays.forEach(ov => ov.setMap(null));
          locationOverlays = [];

          const pulse = new kakao.maps.CustomOverlay({ position: latlng, content: '<div class="my-location-pulse"></div>', zIndex: 4 });
          const dot   = new kakao.maps.CustomOverlay({ position: latlng, content: '<div class="my-location-marker"></div>', zIndex: 5 });

          pulse.setMap(map); dot.setMap(map);
          locationOverlays.push(pulse, dot);
          map.setCenter(latlng);
          map.setLevel(4);
        },
        (err) => {
          btn.classList.remove('loading');
          btn.classList.add('error');
          const messages = { 1: '위치 권한이 거부되었습니다.\n브라우저 설정에서 위치 접근을 허용해주세요.', 2: '위치를 가져올 수 없습니다.', 3: '위치 요청 시간이 초과되었습니다.' };
          alert(messages[err.code] || '위치를 가져오는 데 실패했습니다.');
          setTimeout(() => btn.classList.remove('error'), 3000);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
      );
    });
  }

  /* ── 툴팁 ── */
  function setupTooltip() {
    document.getElementById('tooltip-close').addEventListener('click', resetHighlight);
  }

  function showTooltip(name, type, color) {
    document.getElementById('tooltip-stripe').style.background = color;
    document.getElementById('tooltip-name').textContent = name;
    document.getElementById('tooltip-type').textContent = type;
    document.getElementById('tooltip').classList.add('show');
  }

  function esc(t) {
    return String(t)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
