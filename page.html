<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>마포구 도로명 지도</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 카카오맵 SDK: JavaScript 키 넣기 -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5476b12bce145a577ffb44291160051e"></script>

  <script>
    window.onload = function () {
      const mapContainer = document.getElementById('map');

      const mapOption = {
        center: new kakao.maps.LatLng(37.556, 126.91),
        level: 5
      };

      const map = new kakao.maps.Map(mapContainer, mapOption);

      function getColor(name) {
        let hash = 0;
        name = name || '';

        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }

        return `hsl(${Math.abs(hash) % 360}, 75%, 45%)`;
      }

      function drawLine(coords, roadName) {
        const path = coords.map(function (coord) {
          const lng = coord[0];
          const lat = coord[1];
          return new kakao.maps.LatLng(lat, lng);
        });

        const polyline = new kakao.maps.Polyline({
          path: path,
          strokeWeight: 4,
          strokeColor: getColor(roadName),
          strokeOpacity: 0.85,
          strokeStyle: 'solid'
        });

        polyline.setMap(map);

        kakao.maps.event.addListener(polyline, 'click', function () {
          alert(roadName || '도로명 없음');
        });
      }

      fetch('mapo_roads.geojson')
        .then(function (response) {
          return response.json();
        })
        .then(function (data) {
          data.features.forEach(function (feature) {
            const roadName = feature.properties.RN;
            const geometry = feature.geometry;

            if (geometry.type === 'LineString') {
              drawLine(geometry.coordinates, roadName);
            }

            if (geometry.type === 'MultiLineString') {
              geometry.coordinates.forEach(function (line) {
                drawLine(line, roadName);
              });
            }
          });
        })
        .catch(function (error) {
          console.error('GeoJSON 불러오기 실패:', error);
        });
    };
  </script>
</body>
</html>
